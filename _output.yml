bookdown::gitbook:
  css: style.css
  config:
    toc_depth: 3
    toc:
      before: |
        <li><a href="./">Machine Learning appliqué à l'actuariat</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>
    edit: https://github.com/USERNAME/REPO/edit/BRANCH/%s
    download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
  urlcolor: blue
  linkcolor: blue
  pandoc_args: [
      "-r", "markdown-auto_identifiers"
      ]
bookdown::epub_book: default
